# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # --- BẮT ĐẦU PHẦN THÊM MỚI ---
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Hoặc phiên bản bạn đang dùng

      - name: Install dependencies
        run: npm install

      - name: Build Tailwind CSS
        run: npm run build # Đảm bảo trong package.json đã có script "build"
      # --- KẾT THÚC PHẦN THÊM MỚI ---

      - name: Setup Pages
        uses: actions/configure-pages@v5
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Nếu file index.html và CSS sau khi build nằm ở thư mục gốc thì để '.'
          # Nếu bạn build ra thư mục 'dist' thì đổi thành 'dist'
          path: '.' 

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
